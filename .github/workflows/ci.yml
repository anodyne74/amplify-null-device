name: CI/CD Pipeline

on:
  push:
    branches: [main, 1-delivery-management]
  pull_request:
    branches: [main, 1-delivery-management]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Generate Amplify config
        run: npm run generate:config

      - name: Validate Amplify outputs
        run: npm run validate:amplify-outputs
      
      - name: TypeScript type checking
        run: npm run typecheck
      
      - name: ESLint
        run: npm run lint

      - name: Build project
        run: npm run build
      
      - name: Run tests with coverage
        run: npm run test:ci
      
      - name: Security audit
        run: npm audit --production
