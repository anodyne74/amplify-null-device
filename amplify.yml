version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npm run preflight:ampx
        - npx ampx pipeline-deploy --app-id "$AWS_APP_ID" --branch "$AWS_BRANCH"
        - node scripts/ensure-cognito-groups.js
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Validate the amplify_outputs.json generated by backend deployment.
        - npm run validate:amplify-outputs
    build:
      commands:
        # Build frontend (quality checks already passed in GitHub Actions)
        - npm run build
  artifacts:
    # Next Web Compute output is served from `.next`
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*