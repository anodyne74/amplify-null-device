version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Generate amplify_outputs.json with backend values or placeholders
        # Environment variables: AMPLIFY_COGNITO_USER_POOL_ID, AMPLIFY_COGNITO_CLIENT_ID, AMPLIFY_IDENTITY_POOL_ID
        - node scripts/generate-amplify-outputs-from-backend.js
    build:
      commands:
        # Build frontend (quality checks already passed in GitHub Actions)
        - npm run build
  artifacts:
    # Next static export outputs to `out/` by default when using `next export`
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*