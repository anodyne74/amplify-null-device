version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Backend deployment via Amplify environments
        # Branch-to-environment mapping:
        # - main branch → production environment (Cognito, AppSync, DynamoDB)
        # - 1-delivery-management branch → uat environment (Cognito, AppSync, DynamoDB)
        # Amplify automatically deploys backend CDK resources defined in amplify/backend.ts
        - echo "Backend environment: Amplify will deploy based on branch mapping"
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Generate amplify_outputs.json with backend values or placeholders
        # Environment variables: AMPLIFY_COGNITO_USER_POOL_ID, AMPLIFY_COGNITO_CLIENT_ID, AMPLIFY_IDENTITY_POOL_ID
        - node scripts/generate-amplify-outputs-from-backend.js
    build:
      commands:
        # Build frontend (quality checks already passed in GitHub Actions)
        - npm run build
  artifacts:
    # Next static export outputs to `out/` by default when using `next export`
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*