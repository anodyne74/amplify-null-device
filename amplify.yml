version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Amplify Gen 2 backend deployment is automatic when amplify/backend.ts exists
        # The Amplify platform automatically:
        # 1. Compiles TypeScript backend resources
        # 2. Deploys CloudFormation stacks for auth, data, and all nested resources
        # 3. Outputs credentials to amplify_outputs.json
        # No explicit deployment command needed - npm ci prepares dependencies
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Generate amplify_outputs.json with backend values or placeholders
        # Environment variables: AMPLIFY_COGNITO_USER_POOL_ID, AMPLIFY_COGNITO_CLIENT_ID, AMPLIFY_IDENTITY_POOL_ID
        - node scripts/generate-amplify-outputs-from-backend.js
    build:
      commands:
        # Build frontend (quality checks already passed in GitHub Actions)
        - npm run build
  artifacts:
    # Next static export outputs to `out/` by default when using `next export`
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*