version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npm run preflight:ampx
        - npx ampx pipeline-deploy --app-id "$AWS_APP_ID" --branch "$AWS_BRANCH"
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Generate amplify_outputs.json from backend outputs or environment variables.
        - npm run generate:config
        # Fail deployed CI builds if placeholders remain.
        - npm run validate:amplify-outputs
    build:
      commands:
        # Build frontend (quality checks already passed in GitHub Actions)
        - npm run build
  artifacts:
    # Next static export outputs to `out/` by default when using `next export`
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*