<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .invoice {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
    }
    .details, .items {
      margin-bottom: 20px;
    }
    .items table {
      width: 100%;
      border-collapse: collapse;
    }
    .items th, .items td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    .items th {
      background-color: #f4f4f4;
    }
    .total {
      text-align: right;
      font-size: 1.2em;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="invoice">
    <div class="header">
      <h1>Invoice</h1>
      <p>Invoice Number: {{invoiceNumber}}</p>
      <p>Date: {{invoiceDate}}</p>
    </div>
    <div class="details">
      <p><strong>Customer:</strong> {{customerName}}</p>
      <p><strong>Email:</strong> {{customerEmail}}</p>
    </div>
    <div class="items">
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th>Quantity</th>
            <th>Rate</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          {{#each lineItems}}
          <tr>
            <td>{{description}}</td>
            <td>{{quantity}}</td>
            <td>{{ratePerUnit}}</td>
            <td>{{amount}}</td>
          </tr>
          {{/each}}
        </tbody>
      </table>
    </div>
    <div class="total">
      <p><strong>Total:</strong> ${{totalAmount}}</p>
    </div>
  </div>
</body>
</html>
